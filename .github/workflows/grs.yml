name: Update README Stats

on:
  schedule:
    #
    # @description Runs the workflow automatically at midnight UTC.
    # @param {string} cron - Cron expression for scheduling.
    # @return {void}
    #
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: mrraxyer
          card: stats
          options: "show_icons=true"
          path: profile/stats.svg

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: mrraxyer
          card: top-langs
          options: "layout=compact&langs_count=8"
          path: profile/top-langs.svg

      - name: Commit and Push
        run: |
          #
          # @description Commits the generated SVG files back to the repository.
          # @param {string} user.name - The github-actions bot username.
          # @param {string} user.email - The github-actions bot email.
          # @return {void}
          #
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update github metrics cards" || exit 0
          git push
